services:
  app:
    image: ghcr.io/gkaszewski/movies-diary:latest
    # To build from source instead: comment out "image" and uncomment "build"
    # build:
    #   context: .
    #   args:
    #     FEATURES: sqlite,sqlite-federation
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - data:/data
    restart: unless-stopped

  worker:
    image: ghcr.io/gkaszewski/movies-diary:latest
    # build:
    #   context: .
    #   args:
    #     FEATURES: sqlite,sqlite-federation
    entrypoint: ["./worker"]
    env_file: .env
    volumes:
      - data:/data
    restart: unless-stopped
    depends_on:
      - app

volumes:
  data:
